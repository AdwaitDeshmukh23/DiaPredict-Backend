services:
  - type: web
    name: diapredict-backend
    env: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    staticPublishDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: FRONTEND_ORIGIN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: HF_API_KEY
        sync: false
      - key: HF_MODEL
        value: mistralai/Mistral-7B-Instruct-v0.3
